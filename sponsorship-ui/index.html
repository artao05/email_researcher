<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sponsorship Researcher</title>
  <meta name="description" content="Research company-event alignment for sponsorship targeting" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- View 1: Setup -->
  <div id="view-setup" class="view active">
    <div class="setup-container">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <h1>Sponsorship Researcher</h1>
      </div>
      <p class="subtitle">Research company-event relevance at scale, with human-in-the-loop review.</p>

      <div class="form-group">
        <label for="event-description">Event Description</label>
        <textarea id="event-description" rows="5"
          placeholder="Describe the event — its focus, audience, themes, and scope..."></textarea>
      </div>

      <div class="form-group">
        <label for="sheet-url">Google Sheet URL</label>
        <input type="url" id="sheet-url"
          placeholder="https://docs.google.com/spreadsheets/d/..." />
        <span class="hint">Sheet must have "Company Name" and "Website URL" columns. Share as "Anyone with link can view."</span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="trigger-id">Weft Trigger ID</label>
          <input type="text" id="trigger-id" placeholder="uuid from ApiPost node" />
        </div>
        <div class="form-group">
          <label for="ext-token">Extension Token</label>
          <input type="password" id="ext-token" placeholder="from Weft dashboard" />
        </div>
      </div>

      <div id="parse-status" class="parse-status hidden"></div>

      <button id="run-btn" class="btn-primary" onclick="startResearch()">
        Run Research
      </button>
    </div>
  </div>

  <!-- View 2: Queue -->
  <div id="view-queue" class="view hidden">
    <header class="queue-header">
      <div class="queue-title">
        <span class="logo-icon small">⬡</span>
        <span>Sponsorship Researcher</span>
      </div>
      <div id="queue-stats" class="queue-stats"></div>
      <button class="btn-ghost" onclick="showSetup()">← New Run</button>
    </header>

    <div class="queue-body">
      <div class="event-summary-bar" id="event-summary"></div>
      <div id="company-list" class="company-list"></div>
    </div>
  </div>

  <!-- Review Panel (slide-in) -->
  <div id="review-overlay" class="overlay hidden" onclick="closeReview(event)">
    <div id="review-panel" class="review-panel">
      <button class="close-btn" onclick="closeReview()">✕</button>

      <div class="review-header">
        <h2 id="review-company-name"></h2>
        <a id="review-company-url" href="#" target="_blank" rel="noopener"></a>
      </div>

      <div class="score-pills" id="score-pills"></div>

      <div class="brief-section">
        <h3>Research Brief</h3>
        <div id="review-brief" class="brief-content"></div>
      </div>

      <div class="form-group">
        <label for="annotation-input">Annotation</label>
        <textarea id="annotation-input" rows="3"
          placeholder="Add notes, context, or direction for the outreach..."></textarea>
      </div>

      <div class="form-group hidden" id="direction-group">
        <label for="direction-input">Deeper Dive Direction</label>
        <input type="text" id="direction-input"
          placeholder="What angle should the agent dig into?" />
      </div>

      <div class="review-actions">
        <button class="btn-approve" onclick="submitReview('approve')">✅ Approve</button>
        <button class="btn-dive" onclick="toggleDiveDirection()">🔍 Deeper Dive</button>
        <button class="btn-skip" onclick="submitReview('skip')">⏭ Skip</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
